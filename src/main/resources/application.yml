spring:
  application:
    name: prodops-control-tower-mcp
  profiles:
    default: fixture,http
  ai:
    mcp:
      server:
        enabled: true
        name: ${spring.application.name}
        version: 0.1.0-SNAPSHOT
        instructions: ProdOps Control Tower MCP exposes deterministic, read-only Production Support Intelligence across Kubernetes, Prometheus, and Grafana.
        tool-change-notification: false
        resource-change-notification: false
        prompt-change-notification: false

server:
  address: ${PRODOPS_BIND_ADDRESS:127.0.0.1}
  port: ${PORT:8080}

management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

prodops:
  controltower:
    product-name: ProdOps Control Tower MCP
    product-domain: Production Support Intelligence
    catalog:
      enabled: true
      path: config/service-catalog.example.yaml
      refresh-interval: PT5M
    risk-model:
      path: config/risk-weights.example.yaml
      refresh-interval: PT5M
    guardrails:
      max-lookback: PT6H
      max-range: PT24H
      min-step: PT5M
      default-lookback: PT60M
      max-series: 250
      max-log-lines: 100
      max-dashboards: 10
      max-events: 200
      raw-promql-enabled: true
      require-origin-validation: true
    cache:
      max-entries: 200
      namespace-inventory-ttl: PT2M
      dashboard-ttl: PT10M
      catalog-ttl: PT5M
    rate-limit:
      requests-per-window: 120
      window: PT1M
    http:
      bind-address: ${PRODOPS_BIND_ADDRESS:127.0.0.1}
      mcp-path: /mcp
      public-base-url: ${PRODOPS_PUBLIC_BASE_URL:http://127.0.0.1:8080}
      allowed-origins:
        - http://localhost:*
        - http://127.0.0.1:*
        - https://localhost:*
        - https://127.0.0.1:*
    security:
      jwt-enabled: ${PRODOPS_JWT_ENABLED:false}
      allow-anonymous-local-http: true
      issuer-uri: ${PRODOPS_JWT_ISSUER_URI:}
      jwk-set-uri: ${PRODOPS_JWT_JWKS_URI:}
      audience: ${PRODOPS_JWT_AUDIENCE:prodops-control-tower-mcp}
      required-scope: ${PRODOPS_REQUIRED_SCOPE:prodops.read}
    fixture:
      base-path: fixtures
      scenarios:
        - scenario_payments_rollout_regression
        - scenario_upi_recon_saturation
        - scenario_tradex_alert_storm
    clusters:
      - name: prodops-uat
        environment: UAT
        enabled: true
        namespace-allowlist: []
        team-label-key: owner-team
        criticality-label-key: criticality
        kubernetes:
          in-cluster: false
          kubeconfig: ${KUBECONFIG:}
          context: ${KUBE_CONTEXT:}
          logs-enabled: true
        prometheus:
          base-url: ${PROMETHEUS_BASE_URL:}
          bearer-token-ref: PROMETHEUS_BEARER_TOKEN
          timeout: PT30S
        grafana:
          base-url: ${GRAFANA_BASE_URL:}
          bearer-token-ref: GRAFANA_BEARER_TOKEN
          default-folder: ProdOps
          timeout: PT30S
