apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prodops-control-tower-mcp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prodops-control-tower-mcp
      app.kubernetes.io/component: mcp-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8081
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - ipBlock:
            cidr: 203.0.113.10/32
      ports:
        - protocol: TCP
          port: 443
    - to:
        - ipBlock:
            cidr: 203.0.113.11/32
      ports:
        - protocol: TCP
          port: 443
    - to:
        - ipBlock:
            cidr: 203.0.113.12/32
      ports:
        - protocol: TCP
          port: 443
