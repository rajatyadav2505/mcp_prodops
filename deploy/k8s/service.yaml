apiVersion: v1
kind: Service
metadata:
  name: prodops-control-tower-mcp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prodops-control-tower-mcp
    app.kubernetes.io/component: mcp-server
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: management
      port: 8081
      targetPort: management
---
apiVersion: v1
kind: Service
metadata:
  name: prodops-control-tower-mcp-headless
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: prodops-control-tower-mcp
    app.kubernetes.io/component: mcp-server
  ports:
    - name: http
      port: 8080
      targetPort: http
