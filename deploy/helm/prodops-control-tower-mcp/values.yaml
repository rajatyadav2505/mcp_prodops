replicaCount: 2

image:
  repository: prodops-control-tower-mcp
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

config:
  springProfilesActive: live,http
  publicBaseUrl: https://prodops-control-tower-mcp.uat.example.internal
  jwtEnabled: true
  jwtIssuerUri: https://issuer.example.internal/realms/prodops-control-tower
  jwtJwksUri: https://issuer.example.internal/realms/prodops-control-tower/protocol/openid-connect/certs
  jwtAudience: prodops-control-tower-mcp
  requiredScope: prodops.read
  prometheusBaseUrl: https://prometheus.uat.example.internal
  grafanaBaseUrl: https://grafana.uat.example.internal

secretRefs:
  name: prodops-control-tower-mcp-upstream

service:
  type: ClusterIP
  port: 80
  managementPort: 8081

resources:
  requests:
    cpu: 250m
    memory: 384Mi
  limits:
    cpu: "1"
    memory: 1Gi

ingress:
  enabled: false
  className: nginx
  host: prodops-control-tower-mcp.uat.example.internal

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  cpuAverageUtilization: 70
  memoryAverageUtilization: 75

networkPolicy:
  enabled: true
